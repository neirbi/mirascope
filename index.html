<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirascope — First Principles</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0c0d0f;
  --panel: #13151a;
  --border: rgba(255,255,255,0.07);
  --text: #e8e6e0;
  --muted: #6b6862;
  --mono: 'JetBrains Mono', monospace;
  --display: 'Syne', sans-serif;
  --red: #ff4455;
  --grn: #44dd88;
  --blu: #4499ff;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; }
body { display: flex; flex-direction: column; }

/* ── formula bar ── */
.formula-bar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex;
  align-items: center;
  gap: 32px;
  flex-wrap: wrap;
}
.formula-bar h1 {
  font-family: var(--display);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.02em;
  flex-shrink: 0;
}
.eq {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  flex-wrap: wrap;
}
.eq-part { color: var(--muted); }
.eq-val { font-weight: 600; color: var(--text); }
.verdict {
  margin-left: auto;
  font-size: 15px;
  font-weight: 600;
  padding: 6px 18px;
  border-radius: 5px;
  letter-spacing: 0.02em;
  transition: all 0.2s;
}
.verdict.yes { background: rgba(29,158,117,0.18); color: #1D9E75; border: 1px solid rgba(29,158,117,0.4); }
.verdict.no  { background: rgba(213,69,69,0.18);  color: #D54545; border: 1px solid rgba(213,69,69,0.4); }

/* ── main layout ── */
.app { display: flex; flex: 1; overflow: hidden; }

/* ── sliders ── */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  padding: 22px 18px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  background: var(--panel);
}
.ctrl-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.ctrl-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 6px;
}
.ctrl-name { font-size: 12px; }
.ctrl-val  { font-size: 12px; font-weight: 600; color: #6db5e8; }

input[type=range] {
  -webkit-appearance: none; appearance: none;
  width: 100%; height: 2px;
  background: rgba(255,255,255,0.12);
  border-radius: 1px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 13px; height: 13px; border-radius: 50%;
  background: #5294D8; border: 2px solid var(--bg);
  cursor: pointer; transition: transform 0.1s;
}
input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.25); }

.note {
  margin-top: auto;
  font-size: 10.5px;
  color: var(--muted);
  line-height: 1.7;
  border-top: 1px solid var(--border);
  padding-top: 14px;
}
.note span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

/* ── canvas ── */
.main { flex: 1; padding: 16px; min-width: 0; }
canvas { display: block; width: 100%; height: 100%; background: #07080a; border-radius: 8px; border: 1px solid var(--border); }
</style>
</head>
<body>

<!-- Formula bar -->
<div class="formula-bar">
  <h1>Mirascope</h1>
  <div class="eq">
    <span class="eq-part">f₁ = f₂ =</span>
    <span class="eq-val" id="eqF">—</span>
    <span class="eq-part">&nbsp;·&nbsp; d_sep =</span>
    <span class="eq-val" id="eqD">—</span>
  </div>
  <div class="verdict" id="verdict">—</div>
</div>

<div class="app">

  <!-- Sliders -->
  <aside class="sidebar">

    <div>
      <div class="ctrl-label">Focal length f</div>
      <div class="ctrl-row">
        <span class="ctrl-name">f</span>
        <span class="ctrl-val" id="vF">100 mm</span>
      </div>
      <input type="range" id="sF" min="30" max="250" step="1" value="100">
    </div>

    <div>
      <div class="ctrl-label">Vertex separation</div>
      <div class="ctrl-row">
        <span class="ctrl-name">d_sep</span>
        <span class="ctrl-val" id="vDsep">100 mm</span>
      </div>
      <input type="range" id="sDsep" min="30" max="400" step="1" value="100">
    </div>

    <div>
      <div class="ctrl-label">Mirror diameter</div>
      <div class="ctrl-row">
        <span class="ctrl-name">D</span>
        <span class="ctrl-val" id="vD">280 mm</span>
      </div>
      <input type="range" id="sD" min="100" max="500" step="2" value="280">
    </div>

    <div>
      <div class="ctrl-label">Aperture hole</div>
      <div class="ctrl-row">
        <span class="ctrl-name">A</span>
        <span class="ctrl-val" id="vA">62 mm</span>
      </div>
      <input type="range" id="sA" min="10" max="150" step="1" value="62">
    </div>

    <div class="note">
      <div style="margin-bottom:8px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)">Object LEDs</div>
      <div><span style="background:var(--red)"></span>Red &nbsp; x = −20 mm</div>
      <div><span style="background:var(--grn)"></span>Green &nbsp; x = 0 mm</div>
      <div><span style="background:var(--blu)"></span>Blue &nbsp; x = +20 mm</div>
      <div style="margin-top:10px">3 rays · 3 LEDs<br>Math shows the image.</div>
    </div>

  </aside>

  <!-- Canvas -->
  <main class="main">
    <canvas id="c"></canvas>
  </main>

</div>

<script>
"use strict";

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const $ = id => document.getElementById(id);

// ─── State ───────────────────────────────────────────────────
const P = { f: 100, dSep: 100, D: 280, A: 62 };

// Three LEDs: x offsets in mm, fixed
const LEDS = [
  { x: -20, color: '#ff4455', name: 'R' },
  { x:   0, color: '#44dd88', name: 'G' },
  { x:  20, color: '#4499ff', name: 'B' },
];

// ─── Core math ───────────────────────────────────────────────

// Parabola surface normal (inward, toward focus)
// nx = -(x - vx)/(2f),  ny = +1 (up) or -1 (down)
function normal(x, vx, f, opensUp) {
  const nx = -(x - vx) / (2 * f);
  const ny = opensUp ? 1 : -1;
  const len = Math.hypot(nx, ny);
  return { x: nx/len, y: ny/len };
}

// Reflect direction d off surface with inward normal n
function reflect(d, n) {
  const dot = d.x*n.x + d.y*n.y;
  return { x: d.x - 2*dot*n.x, y: d.y - 2*dot*n.y };
}

// Ray-parabola intersection (smallest positive t)
// Parabola: y = vy ± (x-vx)²/(4f), sgn = +1 opensUp, -1 opensDown
function intersect(ox, oy, dx, dy, vx, vy, f, opensUp) {
  const s = opensUp ? 1 : -1;
  const u = ox - vx, v = oy - vy;
  const A = dx*dx;
  const B = 2*u*dx - 4*f*s*dy;
  const C = u*u - 4*f*s*v;
  let best = null;
  if (Math.abs(A) < 1e-10) {
    if (Math.abs(B) > 1e-10) { const t = -C/B; if (t > 1e-4) best = t; }
  } else {
    const disc = B*B - 4*A*C;
    if (disc >= 0) {
      const sq = Math.sqrt(disc);
      const t1 = (-B-sq)/(2*A), t2 = (-B+sq)/(2*A);
      if (t1 > 1e-4) best = t1;
      else if (t2 > 1e-4) best = t2;
    }
  }
  return best;
}

// Is x within the active mirror surface?
// M1 (opensUp): |x| ≤ D/2, no hole
// M2 (opensDown): A/2 ≤ |x - axOff| ≤ D/2
function onMirror(x, isM1) {
  const halfD = P.D / 2;
  if (isM1) return Math.abs(x) <= halfD;
  return Math.abs(x) >= P.A/2 && Math.abs(x) <= halfD;
}

// Trace ONE ray from object at (objX, objY) at emission angle theta.
// Returns array of {from, to, color} segments plus the outcome.
function traceRay(objX, objY, theta, color) {
  const v1y = -P.dSep / 2;   // M1 vertex y (bottom)
  const v2y = +P.dSep / 2;   // M2 vertex y (top)
  const vx  = 0;              // both vertices on axis

  const segs = [];
  let ox = objX, oy = objY;
  let dx = Math.sin(theta), dy = Math.cos(theta);

  // ── Leg 1: object → M2 ──────────────────────────────────────
  // Check: does the ray escape through the aperture before hitting M2?
  if (dy > 0 && oy < v2y) {
    const t_apt = (v2y - oy) / dy;
    const x_apt = ox + dx * t_apt;
    if (Math.abs(x_apt) < P.A / 2) {
      // escaped — no reflection
      segs.push({ from:{x:ox,y:oy}, to:{x:x_apt,y:v2y}, style:'dashed', color });
      return { segs, outcome: 'escaped' };
    }
  }

  const t2 = intersect(ox, oy, dx, dy, vx, v2y, P.f, false);
  if (t2 === null) return { segs, outcome: 'miss-m2' };

  const hx2 = ox + dx*t2, hy2 = oy + dy*t2;
  if (!onMirror(hx2, false)) {
    segs.push({ from:{x:ox,y:oy}, to:{x:hx2,y:hy2}, style:'dashed', color });
    return { segs, outcome: 'miss-m2-active' };
  }
  segs.push({ from:{x:ox,y:oy}, to:{x:hx2,y:hy2}, style:'solid', color });

  // ── Leg 2: M2 → M1  (should be vertical per parabola property) ──
  const n2 = normal(hx2, vx, P.f, false);
  const r1 = reflect({x:dx,y:dy}, n2);

  const t1 = intersect(hx2, hy2, r1.x, r1.y, vx, v1y, P.f, true);
  if (t1 === null) {
    segs.push({ from:{x:hx2,y:hy2}, to:{x:hx2+r1.x*300,y:hy2+r1.y*300}, style:'dashed', color });
    return { segs, outcome: 'miss-m1' };
  }

  const hx1 = hx2 + r1.x*t1, hy1 = hy2 + r1.y*t1;
  if (!onMirror(hx1, true)) {
    segs.push({ from:{x:hx2,y:hy2}, to:{x:hx1,y:hy1}, style:'dashed', color });
    return { segs, outcome: 'miss-m1-active' };
  }
  segs.push({ from:{x:hx2,y:hy2}, to:{x:hx1,y:hy1}, style:'solid', color });

  // ── Leg 3: M1 → image ───────────────────────────────────────
  const n1 = normal(hx1, vx, P.f, true);
  const r2 = reflect(r1, n1);

  // Where does this ray cross the aperture plane y = v2y?
  if (Math.abs(r2.y) < 1e-9) {
    return { segs, outcome: 'parallel-exit' };
  }
  const t_img = (v2y - hy1) / r2.y;
  if (t_img <= 0) {
    return { segs, outcome: 'wrong-direction' };
  }
  const ix = hx1 + r2.x*t_img;
  const iy = v2y;

  // Does it exit through the aperture?
  const through = Math.abs(ix) < P.A/2;
  // Extend slightly past aperture for visual clarity
  const ext = 40;
  const ex = hx1 + r2.x*(t_img + ext);
  const ey = hy1 + r2.y*(t_img + ext);

  segs.push({ from:{x:hx1,y:hy1}, to:{x:ex,y:ey}, style: through ? 'solid' : 'dashed', color });

  return {
    segs,
    outcome: through ? 'success' : 'blocked',
    imageX: ix,
    imageY: iy,
  };
}

// ─── Verdict ─────────────────────────────────────────────────
function checkVerdict() {
  const tol = P.f * 0.01; // 1% tolerance
  const ok = Math.abs(P.f - P.dSep) <= tol;
  $('eqF').textContent    = P.f + ' mm';
  $('eqD').textContent    = P.dSep + ' mm';
  const v = $('verdict');
  if (ok) {
    v.textContent = '✓  IMAGE FORMS';
    v.className   = 'verdict yes';
  } else {
    const diff = (P.dSep - P.f).toFixed(0);
    const sign = diff > 0 ? '+' : '';
    v.textContent = `✗  NO IMAGE  (d_sep ${sign}${diff} mm from f)`;
    v.className   = 'verdict no';
  }
  return ok;
}

// ─── Rendering ───────────────────────────────────────────────
function setup() {
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.clientWidth  * dpr;
  const H = canvas.clientHeight * dpr;
  canvas.width  = W;
  canvas.height = H;
  return { W, H, dpr };
}

function draw() {
  const { W, H, dpr } = setup();

  // Scale so assembly fits with padding
  const assemblyH = P.dSep + 80;
  const assemblyW = P.D + 80;
  const scale = Math.min(W / assemblyW, H / assemblyH) * 0.82;
  const cx = W / 2;
  const cy = H / 2;

  // Geometry → canvas
  const toX = mm => cx + mm * scale;
  const toY = mm => cy - mm * scale;  // +y is up

  // M1 vertex at y = -dSep/2, M2 vertex at y = +dSep/2
  const v1y = -P.dSep / 2;
  const v2y = +P.dSep / 2;

  ctx.fillStyle = '#07080a';
  ctx.fillRect(0, 0, W, H);

  // ── Optical axis ──
  ctx.strokeStyle = 'rgba(82,148,216,0.2)';
  ctx.lineWidth   = 1 * dpr;
  ctx.setLineDash([6*dpr, 5*dpr]);
  ctx.beginPath();
  ctx.moveTo(cx, toY(v2y + 50));
  ctx.lineTo(cx, toY(v1y - 20));
  ctx.stroke();
  ctx.setLineDash([]);

  // ── Draw one parabola ──
  function drawPara(vy, opensUp, isM1) {
    const halfD  = P.D / 2;
    const halfA  = isM1 ? 0 : P.A / 2;
    const N      = 300;

    // Left side
    const segs = isM1
      ? [[-halfD, halfD]]
      : [[-halfD, -halfA], [halfA, halfD]];

    segs.forEach(([x0, x1]) => {
      ctx.beginPath();
      for (let i = 0; i <= N; i++) {
        const xmm = x0 + (x1 - x0) * i / N;
        const ymm = opensUp
          ? vy + (xmm*xmm)/(4*P.f)
          : vy - (xmm*xmm)/(4*P.f);
        const px = toX(xmm), py = toY(ymm);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.strokeStyle = isM1 ? '#1D9E75' : '#5294D8';
      ctx.lineWidth   = 2.5 * dpr;
      ctx.stroke();
    });

    // Aperture rim (M2 only)
    if (!isM1) {
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth   = 3 * dpr;
      ctx.beginPath();
      ctx.moveTo(toX(-halfA), toY(vy));
      ctx.lineTo(toX( halfA), toY(vy));
      ctx.stroke();
    }
  }

  drawPara(v1y, true,  true);   // M1
  drawPara(v2y, false, false);  // M2

  // ── Focal point markers ──
  const f1pt = { x: 0, y: v1y + P.f };  // M1 focus
  const f2pt = { x: 0, y: v2y - P.f };  // M2 focus

  [f1pt, f2pt].forEach(pt => {
    const sx = toX(pt.x), sy = toY(pt.y);
    ctx.fillStyle = 'rgba(183,156,240,0.5)';
    ctx.beginPath(); ctx.arc(sx, sy, 4*dpr, 0, Math.PI*2); ctx.fill();
  });

  // Label focal points
  ctx.fillStyle = 'rgba(183,156,240,0.7)';
  ctx.font = `${10*dpr}px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'left';
  ctx.fillText('F₁', toX(4), toY(v1y + P.f) + 4*dpr);
  ctx.fillText('F₂', toX(4), toY(v2y - P.f) + 4*dpr);

  // ── Determine if image forms ──
  const imageOk = Math.abs(P.f - P.dSep) <= P.f * 0.01;

  // ── Trace rays for each LED ──
  // Pick one representative angle per LED that reliably hits M2 active surface
  const imagePoints = [];

  LEDS.forEach(led => {
    const objX = led.x;
    const objY = v1y; // object sits at M1 vertex

    // Choose emission angle: aim toward a point on M2 at 60% of half-diameter
    const targetX = (led.x > 0 ? 1 : led.x < 0 ? -1 : 0.7) * P.D * 0.45;
    const targetY = v2y - (targetX*targetX)/(4*P.f); // on M2 surface
    const dx_raw  = targetX - objX;
    const dy_raw  = targetY - objY;
    const len     = Math.hypot(dx_raw, dy_raw);
    const theta   = Math.atan2(dx_raw, dy_raw); // angle from vertical

    const result = traceRay(objX, objY, theta, led.color);

    // Draw segments
    result.segs.forEach(seg => {
      const ax = toX(seg.from.x), ay = toY(seg.from.y);
      const bx = toX(seg.to.x),   by = toY(seg.to.y);

      ctx.strokeStyle  = seg.color;
      ctx.lineWidth    = 1.8 * dpr;
      ctx.globalAlpha  = seg.style === 'solid' ? 0.9 : 0.3;
      ctx.setLineDash(seg.style === 'dashed' ? [5*dpr, 4*dpr] : []);
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.lineTo(bx, by);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    });

    if (result.outcome === 'success' && result.imageX !== undefined) {
      imagePoints.push({ x: result.imageX, y: result.imageY, color: led.color });
    }
  });

  // ── Draw object LEDs ──
  LEDS.forEach(led => {
    const sx = toX(led.x), sy = toY(v1y);
    // glow
    const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, 10*dpr);
    g.addColorStop(0, led.color);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(sx, sy, 10*dpr, 0, Math.PI*2); ctx.fill();
    // dot
    ctx.fillStyle = led.color;
    ctx.beginPath(); ctx.arc(sx, sy, 4*dpr, 0, Math.PI*2); ctx.fill();
    // label
    ctx.fillStyle = led.color;
    ctx.font = `${10*dpr}px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(led.name, sx, sy + 16*dpr);
  });

  // ── Draw image LEDs (if image forms) ──
  // Image is inverted: x-position negated (left↔right swap)
  if (imageOk) {
    const imageY = v2y; // image at M2 vertex = aperture
    LEDS.forEach(led => {
      const imgX  = -led.x;  // inversion: x flips sign
      const sx = toX(imgX), sy = toY(imageY);
      // glow
      const g = ctx.createRadialGradient(sx, sy, 0, sx, sy, 10*dpr);
      g.addColorStop(0, led.color);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle   = g;
      ctx.globalAlpha = 0.6;
      ctx.beginPath(); ctx.arc(sx, sy, 10*dpr, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      // dot (hollow ring to distinguish from object)
      ctx.strokeStyle = led.color;
      ctx.lineWidth   = 1.5*dpr;
      ctx.beginPath(); ctx.arc(sx, sy, 4*dpr, 0, Math.PI*2); ctx.stroke();
      // label
      ctx.fillStyle   = led.color;
      ctx.font        = `${10*dpr}px 'JetBrains Mono', monospace`;
      ctx.textAlign   = 'center';
      ctx.globalAlpha = 0.8;
      ctx.fillText(led.name, sx, sy - 12*dpr);
      ctx.globalAlpha = 1;
    });

    // Image label
    ctx.fillStyle   = 'rgba(255,255,255,0.4)';
    ctx.font        = `${10*dpr}px 'JetBrains Mono', monospace`;
    ctx.textAlign   = 'center';
    ctx.fillText('IMAGE', toX(0), toY(imageY) - 22*dpr);
  }

  // ── Mirror labels ──
  ctx.font      = `${10*dpr}px 'JetBrains Mono', monospace`;
  ctx.fillStyle = 'rgba(29,158,117,0.6)';
  ctx.textAlign = 'right';
  ctx.fillText('M1', toX(-P.D/2) - 8*dpr, toY(v1y));
  ctx.fillStyle = 'rgba(82,148,216,0.6)';
  ctx.fillText('M2', toX(-P.D/2) - 8*dpr, toY(v2y));

  // ── d_sep dimension line ──
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth   = 1*dpr;
  const dimX      = toX(P.D/2 + 16);
  ctx.beginPath();
  ctx.moveTo(dimX, toY(v1y));
  ctx.lineTo(dimX, toY(v2y));
  ctx.stroke();
  // tick marks
  [v1y, v2y].forEach(yy => {
    ctx.beginPath();
    ctx.moveTo(dimX - 4*dpr, toY(yy));
    ctx.lineTo(dimX + 4*dpr, toY(yy));
    ctx.stroke();
  });
  ctx.fillStyle   = 'rgba(255,255,255,0.3)';
  ctx.font        = `${9*dpr}px 'JetBrains Mono', monospace`;
  ctx.textAlign   = 'left';
  ctx.fillText('d_sep', dimX + 6*dpr, toY(0) + 4*dpr);
}

// ─── Update ──────────────────────────────────────────────────
function update() {
  P.f    = +$('sF').value;
  P.dSep = +$('sDsep').value;
  P.D    = +$('sD').value;
  P.A    = +$('sA').value;

  $('vF').textContent    = P.f    + ' mm';
  $('vDsep').textContent = P.dSep + ' mm';
  $('vD').textContent    = P.D    + ' mm';
  $('vA').textContent    = P.A    + ' mm';

  checkVerdict();
  draw();
}

// ─── Wire ────────────────────────────────────────────────────
['sF','sDsep','sD','sA'].forEach(id => $(id).addEventListener('input', update));
new ResizeObserver(update).observe(canvas);
update();
</script>
</body>
</html>
